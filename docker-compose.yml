services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petshop
      POSTGRES_USER: flink
      POSTGRES_PASSWORD: flink
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flink -d petshop"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:3.7.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - >
        /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic pet-sales
        --partitions 1
        --replication-factor 1

  flink-jobmanager:
    build: .
    image: bigdata-flink-lab:latest
    command: standalone-job --job-classname ru.bigdataflink.StreamingStarSchemaJob
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pet-sales
      KAFKA_GROUP_ID: flink-star-schema
      POSTGRES_URL: jdbc:postgresql://postgres:5432/petshop
      POSTGRES_USER: flink
      POSTGRES_PASSWORD: flink
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: 0.0.0.0
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        restart-strategy.type: fixed-delay
        restart-strategy.fixed-delay.attempts: 20
        restart-strategy.fixed-delay.delay: 5 s

  flink-taskmanager:
    image: bigdata-flink-lab:latest
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_started
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1

  producer:
    image: bigdata-flink-lab:latest
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command:
      - java
      - -cp
      - /opt/flink/usrlib/bigdata-flink-lab.jar
      - ru.bigdataflink.CsvKafkaProducer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pet-sales
      INPUT_DIR: /data
      SEND_DELAY_MS: "0"
    volumes:
      - ./исходные данные:/data:ro
    restart: "no"

volumes:
  postgres-data:
